<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>本格ARパノラマ書き上げカメラ</title>
    <script src="https://aframe.io/releases/1.4.0/aframe.min.js"></script>
    <style>
        .ui-layer {
            position: fixed; z-index: 100; width: 100%; text-align: center;
            bottom: 20px; pointer-events: none;
        }
        #shutter-info {
            background: rgba(0,0,0,0.7); color: white; padding: 10px 20px;
            border-radius: 30px; display: inline-block; font-family: sans-serif;
        }
        #save-btn {
            position: fixed; top: 20px; right: 20px; z-index: 101;
            padding: 10px 20px; background: #2ed573; color: white;
            border: none; border-radius: 5px; display: none;
        }
    </style>
</head>
<body style="margin: 0; overflow: hidden;">

    <button id="save-btn">現在のパノラマを保存</button>

    <div class="ui-layer">
        <div id="shutter-info">ドット（AR地点）にカメラを向けてください</div>
    </div>

    <a-scene embedded vr-mode-ui="enabled: false" arjs="sourceType: webcam; debugUIEnabled: false;">
        
        <a-entity camera>
            <a-entity cursor="fuse: true; fuseTimeout: 500"
                      position="0 0 -1"
                      geometry="primitive: ring; radiusInner: 0.02; radiusOuter: 0.03"
                      material="color: white; shader: flat">
            </a-entity>
        </a-entity>

        <a-sphere class="target" position="0 0 -5" radius="0.3" color="#ff3e3e" data-id="0"></a-sphere>
        <a-sphere class="target" position="5 0 0" radius="0.3" color="#ff3e3e" data-id="1"></a-sphere>
        <a-sphere class="target" position="0 0 5" radius="0.3" color="#ff3e3e" data-id="2"></a-sphere>
        <a-sphere class="target" position="-5 0 0" radius="0.3" color="#ff3e3e" data-id="3"></a-sphere>

    </a-scene>

    <canvas id="hidden-canvas" style="display:none;"></canvas>

    <script>
        const saveBtn = document.getElementById('save-btn');
        const info = document.getElementById('shutter-info');
        const video = document.querySelector('video'); // AR.jsが生成するビデオ要素
        let capturedBlobs = [];

        // ターゲットと照準が重なった時のイベント
        const targets = document.querySelectorAll('.target');
        targets.forEach(t => {
            t.addEventListener('mouseenter', () => {
                if (t.getAttribute('visible') === false) return;
                
                t.setAttribute('color', '#2ed573'); // 緑色に
                
                // 1秒後に撮影（視線入力）
                setTimeout(() => {
                    takeSnapshot(t);
                }, 800);
            });
        });

        function takeSnapshot(targetEl) {
            // ARシーンから現在のビデオフレームを取得
            const v = document.querySelector('video');
            const canvas = document.getElementById('hidden-canvas');
            canvas.width = v.videoWidth;
            canvas.height = v.videoHeight;
            const ctx = canvas.getContext('2d');
            ctx.drawImage(v, 0, 0);

            // 保存
            canvas.toBlob(blob => {
                capturedBlobs.push(blob);
                targetEl.setAttribute('visible', 'false'); // 撮ったドットは消す
                info.innerText = `撮影成功！ 残り: ${document.querySelectorAll('.target[visible="true"]').length}`;
                
                if (capturedBlobs.length >= 4) {
                    saveBtn.style.display = 'block';
                    info.innerText = "全地点完了！右上のボタンで保存してください";
                }
            }, 'image/jpeg');
        }

        saveBtn.addEventListener('click', async () => {
            // 簡易結合（横並べ）
            const canvas = document.createElement('canvas');
            const imgHeight = 1080;
            const imgWidth = 1920;
            canvas.width = imgWidth * capturedBlobs.length;
            canvas.height = imgHeight;
            const ctx = canvas.getContext('2d');

            for (let i = 0; i < capturedBlobs.length; i++) {
                const img = await createImageBitmap(capturedBlobs[i]);
                ctx.drawImage(img, i * imgWidth, 0, imgWidth, imgHeight);
            }

            const link = document.createElement('a');
            link.download = 'ar-panorama.jpg';
            link.href = canvas.toDataURL('image/jpeg');
            link.click();
        });
    </script>
</body>
</html>
