<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>360°パノラマ書き上げカメラ</title>
    <style>
        body { margin: 0; overflow: hidden; background: #000; font-family: sans-serif; color: white; }
        #video { width: 100vw; height: 100vh; object-fit: cover; }
        
        /* 中心の照準（レティクル） */
        #reticle {
            position: absolute; top: 50%; left: 50%;
            width: 50px; height: 50px;
            border: 3px solid white; border-radius: 50%;
            transform: translate(-50%, -50%);
            z-index: 10; pointer-events: none;
        }
        /* 水平ガイド線 */
        #horizon {
            position: absolute; top: 50%; left: 0; width: 100%; height: 2px;
            background: rgba(255, 255, 255, 0.3);
            z-index: 9; transform: translateY(-50%);
        }

        /* ガイドドット */
        #target {
            position: absolute; width: 40px; height: 40px;
            background: rgba(255, 62, 62, 0.8); border-radius: 50%;
            box-shadow: 0 0 20px #ff3e3e;
            display: none; z-index: 5;
            transform: translate(-50%, -50%);
            transition: background 0.2s; /* 色変化を滑らかに */
        }

        /* UIパネル */
        #hud {
            position: absolute; top: 20px; left: 0; width: 100%;
            text-align: center; z-index: 20;
        }
        #status { background: rgba(0,0,0,0.6); padding: 5px 15px; border-radius: 20px; font-size: 14px; }
        #progress { font-size: 24px; font-weight: bold; margin-top: 10px; text-shadow: 0 2px 4px rgba(0,0,0,0.5); }

        /* オーバーレイ */
        #overlay {
            position: fixed; inset: 0; background: rgba(0,0,0,0.9);
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            z-index: 100; padding: 20px;
        }
        button { padding: 15px 40px; font-size: 18px; cursor: pointer; border-radius: 30px; border: none; background: #2ed573; color: white; font-weight: bold; }
        button:disabled { background: #555; }
    </style>
</head>
<body>

    <div id="hud">
        <span id="status">センサーを許可してください</span>
        <div id="progress">0 / 8</div>
    </div>

    <div id="horizon"></div>
    <div id="reticle"></div>
    <div id="target"></div>
    <video id="video" autoplay playsinline></video>

    <div id="overlay">
        <div id="pre-start">
            <h3>360度 パノラマ撮影</h3>
            <p>スマホを縦に持ち、ドットに合わせて右に回ってください。</p>
            <p style="font-size:12px; color:#aaa;">※HTTPS環境が必要です。</p>
            <button id="start-btn">撮影開始</button>
        </div>
        <div id="post-process" style="display:none;">
            <h3>パノラマ合成中...</h3>
            <p>しばらくお待ちください</p>
        </div>
    </div>

    <script>
        const video = document.getElementById('video');
        const target = document.getElementById('target');
        const startBtn = document.getElementById('start-btn');
        const overlay = document.getElementById('overlay');
        const statusText = document.getElementById('status');
        const progressText = document.getElementById('progress');

        // 撮影設定
        const TOTAL_POINTS = 8; // 何枚で一周するか
        const ANGLE_STEP = 360 / TOTAL_POINTS;
        const TARGET_PITCH = 0;   // 水平

        // 内部状態
        let currentPoint = 0;
        let targetAzimuth = 0;
        let isProcessing = false;
        let capturedImages = []; // 画像データを溜める配列

        // --- センサー平滑化（ローパスフィルタ）用変数 ---
        let smoothAlpha = null;
        let smoothBeta = null;
        const SMOOTHING_FACTOR = 0.08; // 0~1 (小さいほど滑らか、ただし遅延する。0.05~0.1が妥当)

        // 1. カメラとセンサーの開始
        startBtn.addEventListener('click', async () => {
            try {
                // iPhoneなどのための権限リクエスト
                if (typeof DeviceOrientationEvent.requestPermission === 'function') {
                    const permission = await DeviceOrientationEvent.requestPermission();
                    if (permission !== 'granted') throw new Error("センサー許可が必要です");
                }

                // カメラ起動
                const stream = await navigator.mediaDevices.getUserMedia({ 
                    video: { facingMode: "environment", width: { ideal: 1920 }, height: { ideal: 1080 } }, 
                    audio: false 
                });
                video.srcObject = stream;

                // UI初期化
                document.getElementById('pre-start').style.display = 'none';
                overlay.style.display = 'none';
                statusText.innerText = "ドットに円を合わせてください (右回り)";
                updateProgress();

                // イベント登録
                window.addEventListener('deviceorientation', handleOrientation);
                requestAnimationFrame(updateLoop);

            } catch (err) {
                alert("エラー: " + err.message);
                location.reload();
            }
        });

        // 2. センサーデータの取得と平滑化（震え止め）
        function handleOrientation(event) {
            // 方位角（alpha: 0~360）、前後傾き（beta: -180~180）
            let a = event.alpha;
            let b = event.beta; 

            // 初回データ
            if (smoothAlpha === null) {
                smoothAlpha = a;
                smoothBeta = b;
                // 最初のターゲットを今の向きの少し右に設定
                targetAzimuth = (360 - smoothAlpha + ANGLE_STEP) % 360; 
                return;
            }

            // --- ここが震え止めの核心部分（指数移動平均） ---
            // smooth = (新しい値 * factor) + (前の滑らかな値 * (1 - factor))
            
            // Alpha（方位）の平滑化は0/360度のまたぎを考慮する必要がある
            let diffA = a - smoothAlpha;
            if (diffA > 180) diffA -= 360;
            if (diffA < -180) diffA += 360;
            smoothAlpha += diffA * SMOOTHING_FACTOR;
            // 0~360に正規化
            if (smoothAlpha < 0) smoothAlpha += 360;
            if (smoothAlpha >= 360) smoothAlpha -= 360;

            // Beta（傾き）の平滑化
            smoothBeta = (b * SMOOTHING_FACTOR) + (smoothBeta * (1 - SMOOTHING_FACTOR));
        }

        // 3. メイン描画ループ
        function updateLoop() {
            if (isProcessing || smoothAlpha === null) {
                requestAnimationFrame(updateLoop);
                return;
            }

            // 現在の向き（スマホが北を基準にどれだけ回ったか）
            // alphaは反時計回りなので補正
            let currentAzimuth = (360 - smoothAlpha) % 360;

            // ターゲットと自機の角度差
            let diffA = targetAzimuth - currentAzimuth;
            if (diffA > 180) diffA -= 360;
            if (diffA < -180) diffA += 360;

            let currentPitch = smoothBeta - 75; // 縦持ち（約75度）を基準に
            let diffB = TARGET_PITCH - currentPitch;

            // 画面座標への投影 (FOVを簡易的に60度と想定)
            const fovX = 70;
            const fovY = window.innerHeight / window.innerWidth * fovX;
            const screenX = (window.innerWidth / 2) + (diffA * (window.innerWidth / fovX));
            const screenY = (window.innerHeight / 2) + (diffB * (window.innerHeight / fovY));

            // ドットの表示・移動
            target.style.display = 'block';
            target.style.left = screenX + 'px';
            target.style.top = screenY + 'px';

            // --- 判定とオートシャッター ---
            const tolerance = 25; // 判定の緩さ(px)
            const centerX = window.innerWidth / 2;
            const centerY = window.innerHeight / 2;

            if (Math.abs(screenX - centerX) < tolerance && Math.abs(screenY - centerY) < tolerance) {
                target.style.background = "#2ed573"; // 緑色に
                target.style.boxShadow = "0 0 30px #2ed573";
                isProcessing = true; // 処理中フラグ（連写防止）
                // 震え止めのために、少し置いてからシャッターを切る
                setTimeout(takePhoto, 200); 
            } else {
                target.style.background = "rgba(255, 62, 62, 0.8)"; // 赤色
                target.style.boxShadow = "0 0 20px #ff3e3e";
            }

            requestAnimationFrame(updateLoop);
        }

        function updateProgress() {
            progressText.innerText = `${currentPoint} / ${TOTAL_POINTS}`;
        }

        // 4. 写真撮影（メモリ保存）
        function takePhoto() {
            // フラッシュ演出
            const flash = document.createElement('div');
            flash.style.cssText = "position:fixed; inset:0; background:white; z-index:1000;";
            document.body.appendChild(flash);
            setTimeout(() => flash.remove(), 100);

            // 現時点のビデオフレームをキャンバスにキャプチャ
            const canvas = document.createElement('canvas');
            // ビデオの本来の解像度でキャプチャする（重要：縦持ちなので幅と高さを入れ替える場合があるが、ここではplaysinlineの挙動に任せる）
            canvas.width = video.videoWidth;
            canvas.height = video.videoHeight;
            const ctx = canvas.getContext('2d');
            ctx.drawImage(video, 0, 0);

            // 画像（Blob）として配列に保存
            canvas.toBlob((blob) => {
                capturedImages.push(blob);
                currentPoint++;
                updateProgress();

                if (currentPoint < TOTAL_POINTS) {
                    // 次のポイントへ
                    targetAzimuth = (targetAzimuth + ANGLE_STEP) % 360;
                    statusText.innerText = "次のドットへ移動...";
                    isProcessing = false; // ガイド再開
                } else {
                    // 撮影完了
                    finishCapture();
                }
            }, 'image/jpeg', 0.9);
        }

        // 5. 撮影完了、合成、ダウンロード（書き上げ）
        function finishCapture() {
            statusText.innerText = "撮影完了！合成しています...";
            target.style.display = 'none';
            overlay.style.display = 'flex';
            document.getElementById('post-process').style.display = 'block';
            
            // メモリ制限回避のため、少し待ってから合成開始
            setTimeout(processFinalImage, 500);
        }

        async function processFinalImage() {
            if (capturedImages.length === 0) return;

            // 1枚目の画像から高さを取得
            const firstImg = await createImageBitmap(capturedImages[0]);
            const h = firstImg.height;
            const w = firstImg.width;
            
            // 重なり（オーバーラップ）を考慮した合成（簡易的なので、30%重ねる）
            const overlap = 0.3; 
            const effectiveWidth = Math.floor(w * (1 - overlap));

            // 最終キャンバスのサイズ（横長）
            const finalCanvas = document.createElement('canvas');
            // 最後の枚数分は重ならないので調整
            finalCanvas.width = effectiveWidth * (TOTAL_POINTS - 1) + w; 
            finalCanvas.height = h;
            const ctx = finalCanvas.getContext('2d');

            console.log("合成開始...", finalCanvas.width, finalCanvas.height);

            // 画像を順番にキャンバスに描画
            for (let i = 0; i < capturedImages.length; i++) {
                const imgBitmap = await createImageBitmap(capturedImages[i]);
                const xPos = i * effectiveWidth;
                
                // フェザリング（境界をぼかす）処理は重いので、単に上書き
                ctx.drawImage(imgBitmap, xPos, 0);
                imgBitmap.close(); // メモリ解放
            }

            // ダウンロード処理
            statusText.innerText = "画像ファイルを作成中...";
            finalCanvas.toBlob((blob) => {
                const url = URL.createObjectURL(blob);
                const a = document.createElement('a');
                a.href = url;
                a.download = `panorama_${Date.now()}.jpg`;
                document.body.appendChild(a);
                a.click();
                
                // 後片付け
                setTimeout(() => {
                    URL.revokeObjectURL(url);
                    document.body.removeChild(a);
                    alert("パノラマ画像を保存しました。ブラウザによっては保存場所の確認が出ます。");
                    location.reload(); // 最初に戻る
                }, 100);
            }, 'image/jpeg', 0.85);
        }
    </script>
</body>
</html>
