<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>360ARカメラ</title>
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
    
    <script src="https://aframe.io/releases/1.4.0/aframe.min.js"></script>
    <script src="https://raw.githack.com/AR-js-org/AR.js/master/aframe/build/aframe-ar.js"></script>

    <style>
        body { margin: 0; overflow: hidden; background: #000; }
        .ui-msg {
            position: fixed; bottom: 40px; left: 50%; transform: translateX(-50%);
            background: rgba(0,0,0,0.7); color: white; padding: 15px 25px;
            border-radius: 30px; z-index: 1000; width: 80%; text-align: center;
            font-family: sans-serif; pointer-events: none;
        }
        #shutter-flash {
            position: fixed; inset: 0; background: white; z-index: 2000; display: none;
        }
        #save-panel {
            position: fixed; top: 20px; right: 20px; z-index: 1001; display: none;
        }
        button {
            padding: 12px 24px; background: #28a745; color: white; border: none; border-radius: 8px; font-weight: bold;
        }
    </style>
</head>
<body>

    <div id="shutter-flash"></div>
    <div class="ui-msg" id="msg">周りを見渡して「赤い球」を探してください</div>
    
    <div id="save-panel">
        <button id="save-btn">パノラマを保存</button>
    </div>

    <a-scene embedded vr-mode-ui="enabled: false" arjs="sourceType: webcam; debugUIEnabled: false;">
        
        <a-entity camera look-controls raycaster="objects: .target">
            <a-entity cursor="fuse: true; fuseTimeout: 1000"
                      position="0 0 -1"
                      geometry="primitive: ring; radiusInner: 0.02; radiusOuter: 0.03"
                      material="color: #007AFF; shader: flat">
                <a-animation attribute="scale" begin="cursor-fusing" easing="ease-in" dur="1000" fill="backwards" from="1 1 1" to="0.1 0.1 0.1"></a-animation>
            </a-entity>
        </a-entity>

        <a-sphere class="target" position="0 0 -5" radius="0.3" color="#ff0000"></a-sphere>
        <a-sphere class="target" position="5 0 0" radius="0.3" color="#ff0000"></a-sphere>
        <a-sphere class="target" position="0 0 5" radius="0.3" color="#ff0000"></a-sphere>
        <a-sphere class="target" position="-5 0 0" radius="0.3" color="#ff0000"></a-sphere>
        <a-sphere class="target" position="0 5 0" radius="0.3" color="#ff0000"></a-sphere>

    </a-scene>

    <script>
        const msg = document.getElementById('msg');
        const flash = document.getElementById('shutter-flash');
        const saveBtn = document.getElementById('save-btn');
        let capturedImages = [];

        // 球体にカーソルが合って1秒経つと発火
        document.querySelectorAll('.target').forEach(target => {
            target.addEventListener('click', function () {
                if (this.getAttribute('visible') === false) return;
                
                // 撮影処理
                takePhoto(this);
            });
        });

        function takePhoto(el) {
            // フラッシュ演出
            flash.style.display = 'block';
            setTimeout(() => { flash.style.display = 'none'; }, 100);

            // カメラ映像の保存
            const video = document.querySelector('video');
            const canvas = document.createElement('canvas');
            canvas.width = video.videoWidth;
            canvas.height = video.videoHeight;
            canvas.getContext('2d').drawImage(video, 0, 0);
            
            capturedImages.push(canvas.toDataURL('image/jpeg'));

            // 撮ったドットを消す
            el.setAttribute('visible', false);
            el.setAttribute('scale', '0 0 0');

            msg.innerText = `ナイス！残り ${document.querySelectorAll('.target[visible="true"]').length} 個`;

            if (document.querySelectorAll('.target[visible="true"]').length === 0) {
                msg.innerText = "すべての地点を撮影しました！";
                document.getElementById('save-panel').style.display = 'block';
            }
        }

        saveBtn.addEventListener('click', async () => {
            const finalCanvas = document.createElement('canvas');
            const num = capturedImages.length;
            finalCanvas.width = 1280 * num;
            finalCanvas.height = 720;
            const ctx = finalCanvas.getContext('2d');

            for (let i = 0; i < num; i++) {
                const img = new Image();
                img.src = capturedImages[i];
                await new Promise(r => img.onload = r);
                ctx.drawImage(img, i * 1280, 0, 1280, 720);
            }

            const link = document.createElement('a');
            link.download = 'panorama.jpg';
            link.href = finalCanvas.toDataURL('image/jpeg');
            link.click();
        });

        // iPhone対策：画面をどこでもいいからタップするとARが安定開始する
        window.addEventListener('click', () => {
            const scene = document.querySelector('a-scene');
            if (scene) msg.innerText = "ターゲットを探してください...";
        });
    </script>
</body>
</html>
