<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>360度パノラマ・メーカー</title>
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
    <script src="https://aframe.io/releases/1.4.0/aframe.min.js"></script>
    <script src="https://raw.githack.com/AR-js-org/AR.js/master/aframe/build/aframe-ar.js"></script>
    <style>
        body { margin: 0; overflow: hidden; background: #000; font-family: sans-serif; }
        .ui-hud {
            position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%);
            background: rgba(0,0,0,0.8); color: white; padding: 15px 25px;
            border-radius: 40px; z-index: 1000; text-align: center; width: 80%; pointer-events: none;
        }
        #flash {
            position: fixed; inset: 0; background: white; z-index: 2000; display: none;
        }
        #save-panel {
            position: fixed; top: 20px; right: 20px; z-index: 1001; display: none;
        }
        button {
            padding: 15px 25px; background: #007AFF; color: white; border: none; border-radius: 12px; font-weight: bold; font-size: 16px;
        }
    </style>
</head>
<body>

    <div id="flash"></div>
    <div class="ui-hud" id="msg">タップして開始し、6つの点を緑に変えてください</div>
    
    <div id="save-panel">
        <button id="save-btn">360度写真として保存</button>
    </div>

    <a-scene embedded vr-mode-ui="enabled: false" arjs="sourceType: webcam; debugUIEnabled: false;">
        <a-entity camera look-controls raycaster="objects: .target">
            <a-entity cursor="fuse: true; fuseTimeout: 1000"
                      position="0 0 -1"
                      geometry="primitive: ring; radiusInner: 0.02; radiusOuter: 0.03"
                      material="color: #007AFF; shader: flat">
                <a-animation begin="cursor-fusing" easing="linear" dur="1000" attribute="scale" from="1 1 1" to="0.1 0.1 0.1"></a-animation>
            </a-entity>
        </a-entity>

        <a-sphere class="target" id="front" position="0 0 -5" radius="0.3" color="#ff4757" data-dir="0"></a-sphere>
        <a-sphere class="target" id="right" position="5 0 0" radius="0.3" color="#ff4757" data-dir="1"></a-sphere>
        <a-sphere class="target" id="back" position="0 0 5" radius="0.3" color="#ff4757" data-dir="2"></a-sphere>
        <a-sphere class="target" id="left" position="-5 0 0" radius="0.3" color="#ff4757" data-dir="3"></a-sphere>
        <a-sphere class="target" id="top" position="0 5 0" radius="0.3" color="#ff4757" data-dir="4"></a-sphere>
        <a-sphere class="target" id="bottom" position="0 -5 0" radius="0.3" color="#ff4757" data-dir="5"></a-sphere>
    </a-scene>

    <script>
        const msg = document.getElementById('msg');
        const flash = document.getElementById('flash');
        const saveBtn = document.getElementById('save-btn');
        // 方向ごとの画像データを格納
        let photos = { 0:null, 1:null, 2:null, 3:null, 4:null, 5:null };

        document.querySelectorAll('.target').forEach(target => {
            target.addEventListener('click', function () {
                const dirId = this.getAttribute('data-dir');
                takeSnapshot(dirId, this);
            });
        });

        function takeSnapshot(id, el) {
            const video = document.querySelector('video');
            const canvas = document.createElement('canvas');
            // 高画質でキャプチャ
            canvas.width = video.videoWidth;
            canvas.height = video.videoHeight;
            canvas.getContext('2d').drawImage(video, 0, 0);
            
            photos[id] = canvas.toDataURL('image/jpeg', 0.9);
            el.setAttribute('color', '#2ed573'); // 撮影済みは緑
            
            // フラッシュ
            flash.style.display = 'block';
            setTimeout(() => flash.style.display = 'none', 100);

            const count = Object.values(photos).filter(p => p !== null).length;
            msg.innerText = `撮影済み: ${count} / 6 地点`;

            if (count === 6) {
                document.getElementById('save-panel').style.display = 'block';
                msg.innerText = "全地点完了！保存してください";
            }
        }

        saveBtn.addEventListener('click', async () => {
            const output = document.createElement('canvas');
            // パノラマの標準比率 2:1 (例: 4096 x 2048)
            const w = 4096;
            const h = 2048;
            output.width = w;
            output.height = h;
            const ctx = output.getContext('2d');

            // 背景を黒で塗りつぶし
            ctx.fillStyle = "black";
            ctx.fillRect(0,0,w,h);

            const unitW = w / 4; // 横を4分割（前・右・後・左）
            const unitH = h / 2; // 縦を2分割（中央列と上下）

            // 各画像を適切な位置に配置（簡易的な展開図マッピング）
            const positions = [
                { id:0, x: 0, y: unitH/2 },      // 前
                { id:1, x: unitW, y: unitH/2 },  // 右
                { id:2, x: unitW*2, y: unitH/2 },// 後
                { id:3, x: unitW*3, y: unitH/2 },// 左
                { id:4, x: unitW, y: 0 },        // 上
                { id:5, x: unitW, y: unitH }     // 下
            ];

            for (let pos of positions) {
                if (!photos[pos.id]) continue;
                const img = new Image();
                img.src = photos[pos.id];
                await new Promise(r => img.onload = r);
                // 画像をグリッドに合わせて描画
                ctx.drawImage(img, pos.x, pos.y, unitW, unitH/2);
            }

            const link = document.createElement('a');
            link.download = '360_panorama.jpg';
            link.href = output.toDataURL('image/jpeg', 0.8);
            link.click();
        });

        window.addEventListener('click', () => {
            msg.innerText = "的を合わせて撮影してください";
        });
    </script>
</body>
</html>
