<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>360全方位ARカメラ</title>
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
    
    <script src="https://aframe.io/releases/1.4.0/aframe.min.js"></script>
    <script src="https://raw.githack.com/AR-js-org/AR.js/master/aframe/build/aframe-ar.js"></script>

    <style>
        body { margin: 0; overflow: hidden; background: #000; }
        .ui-msg {
            position: fixed; bottom: 40px; left: 50%; transform: translateX(-50%);
            background: rgba(0,0,0,0.8); color: white; padding: 12px 20px;
            border-radius: 30px; z-index: 1000; width: 85%; text-align: center;
            font-family: sans-serif; pointer-events: none; font-size: 14px;
        }
        #shutter-flash {
            position: fixed; inset: 0; background: white; z-index: 2000; display: none;
        }
        #save-panel {
            position: fixed; top: 20px; right: 20px; z-index: 1001;
        }
        button {
            padding: 12px 20px; background: #28a745; color: white; border: none; border-radius: 8px; font-weight: bold;
        }
        /* ロード中表示 */
        #loader {
            position: fixed; inset: 0; background: #000; color: white;
            display: flex; align-items: center; justify-content: center; z-index: 3000;
        }
    </style>
</head>
<body>

    <div id="loader">カメラ起動中...画面をタップしてください</div>
    <div id="shutter-flash"></div>
    <div class="ui-msg" id="msg">全方向の点を「緑」に変えてください (残り: 6)</div>
    
    <div id="save-panel">
        <button id="save-btn">パノラマ書き出し</button>
    </div>

    <a-scene embedded vr-mode-ui="enabled: false" arjs="sourceType: webcam; debugUIEnabled: false;">
        
        <a-entity camera look-controls raycaster="objects: .target">
            <a-entity id="cursor" cursor="fuse: true; fuseTimeout: 1000"
                      position="0 0 -1"
                      geometry="primitive: ring; radiusInner: 0.02; radiusOuter: 0.03"
                      material="color: #007AFF; shader: flat">
                <a-animation begin="cursor-fusing" easing="linear" dur="1000" attribute="scale" from="1 1 1" to="0.1 0.1 0.1"></a-animation>
                <a-animation begin="mouseleave" easing="linear" dur="100" attribute="scale" to="1 1 1"></a-animation>
            </a-entity>
        </a-entity>

        <a-sphere class="target" id="pt1" position="0 0 -4" radius="0.25" color="#ff0000" data-taken="false"></a-sphere>
        <a-sphere class="target" id="pt2" position="4 0 0" radius="0.25" color="#ff0000" data-taken="false"></a-sphere>
        <a-sphere class="target" id="pt3" position="0 0 4" radius="0.25" color="#ff0000" data-taken="false"></a-sphere>
        <a-sphere class="target" id="pt4" position="-4 0 0" radius="0.25" color="#ff0000" data-taken="false"></a-sphere>
        <a-sphere class="target" id="pt5" position="0 4 0" radius="0.25" color="#ff0000" data-taken="false"></a-sphere>
        <a-sphere class="target" id="pt6" position="0 -4 0" radius="0.25" color="#ff0000" data-taken="false"></a-sphere>

    </a-scene>

    <script>
        const msg = document.getElementById('msg');
        const flash = document.getElementById('shutter-flash');
        const saveBtn = document.getElementById('save-btn');
        const loader = document.getElementById('loader');
        let capturedImages = [];

        // 画面タップで開始（iPhone対策）
        window.addEventListener('click', () => {
            loader.style.display = 'none';
        });

        // ターゲットにカーソルが合って1秒経つ（fuse発火）と click イベントが飛ぶ
        document.querySelectorAll('.target').forEach(target => {
            target.addEventListener('click', function () {
                // すでに撮影済みならスキップ
                if (this.getAttribute('data-taken') === "true") return;
                
                takePhoto(this);
            });
        });

        function takePhoto(el) {
            // 撮影フラッシュ
            flash.style.display = 'block';
            setTimeout(() => { flash.style.display = 'none'; }, 100);

            // カメラ映像をキャプチャ
            const video = document.querySelector('video');
            if(!video) return;

            const canvas = document.createElement('canvas');
            canvas.width = video.videoWidth;
            canvas.height = video.videoHeight;
            canvas.getContext('2d').drawImage(video, 0, 0);
            
            capturedImages.push(canvas.toDataURL('image/jpeg'));

            // 状態更新：点は消さずに色を緑に変える
            el.setAttribute('color', '#28a745');
            el.setAttribute('data-taken', "true");

            const remaining = document.querySelectorAll('.target[data-taken="false"]').length;
            msg.innerText = remaining > 0 ? `ナイス！残り: ${remaining}` : "全地点完了！書き出せます";
        }

        saveBtn.addEventListener('click', async () => {
            if(capturedImages.length === 0) return alert("まだ1枚も撮れていません");

            const finalCanvas = document.createElement('canvas');
            const num = capturedImages.length;
            // 縦に並べると360度感が薄れるので、とりあえず横に繋げます
            finalCanvas.width = 1280 * num;
            finalCanvas.height = 720;
            const ctx = finalCanvas.getContext('2d');

            for (let i = 0; i < num; i++) {
                const img = new Image();
                img.src = capturedImages[i];
                await new Promise(r => img.onload = r);
                ctx.drawImage(img, i * 1280, 0, 1280, 720);
            }

            const link = document.createElement('a');
            link.download = `360_panorama_${Date.now()}.jpg`;
            link.href = finalCanvas.toDataURL('image/jpeg');
            link.click();
        });
    </script>
</body>
</html>
