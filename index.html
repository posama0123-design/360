<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>360°撮影ガイドカメラ</title>
    <style>
        body { margin: 0; overflow: hidden; background: #000; font-family: sans-serif; }
        #video { width: 100vw; height: 100vh; object-fit: cover; }
        
        /* 画面中央の固定レティクル（照準） */
        #reticle {
            position: absolute; top: 50%; left: 50%;
            width: 40px; height: 40px;
            border: 2px solid white; border-radius: 50%;
            transform: translate(-50%, -50%);
            z-index: 10;
        }

        /* 空中に浮いているターゲット（点） */
        #target {
            position: absolute;
            width: 30px; height: 30px;
            background: #ff3e3e; border-radius: 50%;
            box-shadow: 0 0 15px #ff3e3e;
            display: none; z-index: 5;
            transform: translate(-50%, -50%);
        }

        #status {
            position: absolute; top: 20px; width: 100%;
            text-align: center; color: white; background: rgba(0,0,0,0.5);
        }

        #start-overlay {
            position: fixed; inset: 0; background: rgba(0,0,0,0.8);
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            color: white; z-index: 100;
        }
        button { padding: 15px 30px; font-size: 18px; cursor: pointer; border-radius: 30px; border: none; }
    </style>
</head>
<body>

    <div id="start-overlay">
        <h3>360度ガイドカメラ</h3>
        <p>センサーとカメラを許可してください</p>
        <button id="start-btn">撮影開始</button>
    </div>

    <div id="status">ターゲットに円を合わせてください</div>
    <div id="reticle"></div>
    <div id="target"></div>
    <video id="video" autoplay playsinline></video>

    <script>
        const video = document.getElementById('video');
        const target = document.getElementById('target');
        const startBtn = document.getElementById('start-btn');
        const startOverlay = document.getElementById('start-overlay');
        const statusText = document.getElementById('status');

        // ターゲットの仮想位置 (0-360度)
        let targetAzimuth = 45; // 右に45度の位置
        let targetPitch = 0;   // 水平の位置

        let currentAlpha = 0; // 方位角
        let currentBeta = 0;  // 前後傾き

        // 1. カメラの起動
        async function startCamera() {
            const stream = await navigator.mediaDevices.getUserMedia({ 
                video: { facingMode: "environment" }, 
                audio: false 
            });
            video.srcObject = stream;
        }

        // 2. センサーの許可と開始
        startBtn.addEventListener('click', async () => {
            // iOSなどのための権限リクエスト
            if (typeof DeviceOrientationEvent.requestPermission === 'function') {
                const permission = await DeviceOrientationEvent.requestPermission();
                if (permission !== 'granted') return;
            }

            await startCamera();
            startOverlay.style.display = 'none';
            window.addEventListener('deviceorientation', handleOrientation);
            updateLoop();
        });

        function handleOrientation(event) {
            // alpha: 北を基準にした回転(0-360), beta: 前後の傾き(-180-180)
            currentAlpha = event.alpha;
            currentBeta = event.beta;
        }

        function updateLoop() {
            // 方位角の差分計算
            let diffA = targetAzimuth - (360 - currentAlpha);
            let diffB = targetPitch - (currentBeta - 90); // 垂直持ちを基準に調整

            // 画面上の座標に変換（簡易的な投影）
            const fov = 60; // 視野角の想定
            const screenX = (window.innerWidth / 2) + (diffA * (window.innerWidth / fov));
            const screenY = (window.innerHeight / 2) + (diffB * (window.innerHeight / fov));

            target.style.display = 'block';
            target.style.left = screenX + 'px';
            target.style.top = screenY + 'px';

            // 判定：中心のレティクルと重なったか
            const distance = Math.sqrt(Math.pow(window.innerWidth/2 - screenX, 2) + Math.pow(window.innerHeight/2 - screenY, 2));

            if (distance < 25) { // 25px以内に近づいたら
                target.style.background = "#2ed573";
                autoShutter();
            } else {
                target.style.background = "#ff3e3e";
            }

            requestAnimationFrame(updateLoop);
        }

        function autoShutter() {
            // ここで写真を保存する処理
            statusText.innerText = "📸 撮影しました！ 次のポイントへ...";
            
            // 次のターゲットを適当に移動させる（例：右へ30度）
            targetAzimuth = (targetAzimuth + 30) % 360;
            
            // 実際はここでCanvasに描画して保存処理を行う
            const flash = document.createElement('div');
            flash.style.cssText = "position:fixed; inset:0; background:white; z-index:1000;";
            document.body.appendChild(flash);
            setTimeout(() => flash.remove(), 100);
        }
    </script>
</body>
</html>
